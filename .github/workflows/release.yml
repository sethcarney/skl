name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to release (e.g. 1.0.0) — skips the duplicate check"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(grep 'const Version' src/main.go | grep -oP '"\K[^"]+')" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - name: Build binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist
          cd src
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/skl-linux-x64
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/skl-linux-arm64
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/skl-macos-x64
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/skl-macos-arm64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/skl-windows-x64.exe

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/skl-linux-x64 \
            dist/skl-linux-arm64 \
            dist/skl-macos-x64 \
            dist/skl-macos-arm64 \
            dist/skl-windows-x64.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
