name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to release (e.g. 1.0.0) — skips the duplicate check"
        required: false

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Get version
        id: version
        run: echo "version=$(grep 'const Version' internal/version/version.go | grep -oP '"\K[^"]+')" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/mdm-linux-x64
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/mdm-linux-arm64
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/mdm-macos-x64
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/mdm-macos-arm64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/mdm-windows-x64.exe

      - name: Generate checksums
        if: steps.check.outputs.exists == 'false'
        run: cd dist && sha256sum * > sha256sums.txt

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/mdm-linux-x64 \
            dist/mdm-linux-arm64 \
            dist/mdm-macos-x64 \
            dist/mdm-macos-arm64 \
            dist/mdm-windows-x64.exe \
            dist/sha256sums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
