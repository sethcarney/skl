name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        if: steps.check.outputs.exists == 'false'
        uses: oven-sh/setup-bun@v2

      - name: Enable Corepack
        if: steps.check.outputs.exists == 'false'
        run: corepack enable

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist-bin
          bun build --compile --target=bun-linux-x64    --define "__SKILLS_VERSION__='$VERSION'" --outfile=dist-bin/skills-linux-x64        src/cli.ts
          bun build --compile --target=bun-linux-arm64  --define "__SKILLS_VERSION__='$VERSION'" --outfile=dist-bin/skills-linux-arm64       src/cli.ts
          bun build --compile --target=bun-darwin-x64   --define "__SKILLS_VERSION__='$VERSION'" --outfile=dist-bin/skills-macos-x64         src/cli.ts
          bun build --compile --target=bun-darwin-arm64 --define "__SKILLS_VERSION__='$VERSION'" --outfile=dist-bin/skills-macos-arm64       src/cli.ts
          bun build --compile --target=bun-windows-x64  --define "__SKILLS_VERSION__='$VERSION'" --outfile=dist-bin/skills-windows-x64.exe  src/cli.ts

      - name: Create GitHub Release with binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist-bin/skills-linux-x64 \
            dist-bin/skills-linux-arm64 \
            dist-bin/skills-macos-x64 \
            dist-bin/skills-macos-arm64 \
            dist-bin/skills-windows-x64.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
