name: Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach binaries to (e.g. v1.4.9)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build binaries
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p dist-bin
          bun build --compile --target=bun-linux-x64    --define "__SKILLS_VERSION__='$VERSION'" --outfile=dist-bin/skills-linux-x64         src/cli.ts
          bun build --compile --target=bun-linux-arm64  --define "__SKILLS_VERSION__='$VERSION'" --outfile=dist-bin/skills-linux-arm64        src/cli.ts
          bun build --compile --target=bun-darwin-x64   --define "__SKILLS_VERSION__='$VERSION'" --outfile=dist-bin/skills-macos-x64          src/cli.ts
          bun build --compile --target=bun-darwin-arm64 --define "__SKILLS_VERSION__='$VERSION'" --outfile=dist-bin/skills-macos-arm64        src/cli.ts
          bun build --compile --target=bun-windows-x64  --define "__SKILLS_VERSION__='$VERSION'" --outfile=dist-bin/skills-windows-x64.exe   src/cli.ts

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload binaries to release
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            dist-bin/skills-linux-x64 \
            dist-bin/skills-linux-arm64 \
            dist-bin/skills-macos-x64 \
            dist-bin/skills-macos-arm64 \
            dist-bin/skills-windows-x64.exe \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
