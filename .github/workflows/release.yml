name: Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to release (e.g. 1.0.0) — skips the duplicate check"
        required: false

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # needed for OIDC keyless cosign signing
    outputs:
      version: ${{ steps.version.outputs.version }}
      hashes: ${{ steps.hash.outputs.hashes }}
      release_exists: ${{ steps.check.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version
        id: version
        run: echo "version=$(grep 'const Version' internal/version/version.go | grep -oP
          '"\K[^"]+')" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Generate Windows resource (version info + committed icon)
        if: steps.check.outputs.exists == 'false'
        run: make syso

      - name: Build binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/mdm-linux-x64
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/mdm-linux-arm64
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/mdm-macos-x64
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/mdm-macos-arm64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/mdm-windows-x64.exe

      - name: Generate checksums
        id: hash
        if: steps.check.outputs.exists == 'false'
        run: |
          cd dist
          sha256sum mdm-linux-x64 mdm-linux-arm64 mdm-macos-x64 mdm-macos-arm64 mdm-windows-x64.exe > sha256sums.txt
          echo "hashes=$(sha256sum mdm-linux-x64 mdm-linux-arm64 mdm-macos-x64 mdm-macos-arm64 mdm-windows-x64.exe | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Install cosign
        if: steps.check.outputs.exists == 'false'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          for f in dist/mdm-linux-x64 dist/mdm-linux-arm64 dist/mdm-macos-x64 dist/mdm-macos-arm64 dist/mdm-windows-x64.exe; do
            cosign sign-blob --yes "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem"
          done

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            dist/mdm-linux-x64 \
            dist/mdm-linux-arm64 \
            dist/mdm-macos-x64 \
            dist/mdm-macos-arm64 \
            dist/mdm-windows-x64.exe \
            dist/mdm-linux-x64.sig \
            dist/mdm-linux-x64.pem \
            dist/mdm-linux-arm64.sig \
            dist/mdm-linux-arm64.pem \
            dist/mdm-macos-x64.sig \
            dist/mdm-macos-x64.pem \
            dist/mdm-macos-arm64.sig \
            dist/mdm-macos-arm64.pem \
            dist/mdm-windows-x64.exe.sig \
            dist/mdm-windows-x64.exe.pem \
            dist/sha256sums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  provenance:
    needs: [ release ]
    if: needs.release.outputs.release_exists == 'false'
    permissions:
      actions: read
      id-token: write
      contents: write
    # Note: slsa-github-generator reusable workflows MUST be referenced by tag,
    # not by commit SHA. The generator reads github.action_ref at runtime to
    # determine which binary release to download; a SHA reference breaks that
    # lookup. This is a documented upstream requirement:
    # https://github.com/slsa-framework/slsa-github-generator#referencing-slsa-builders-and-generators
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true
      upload-tag-name: "v${{ needs.release.outputs.version }}"
